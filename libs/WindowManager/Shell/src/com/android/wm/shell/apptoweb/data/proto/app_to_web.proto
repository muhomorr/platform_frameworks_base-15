syntax = "proto2";

option java_package = "com.android.wm.shell.apptoweb.data";
option java_multiple_files = true;

message AppToWebUserRepository {
  // Package names of the apps where the first-run prompt is shown.
  repeated string first_run_prompt_shown_packages = 1;
}

// App-to-Web data
message AppToWebProto {
  // Stores a mapping between a user and their app-to-web repository. The key is the user id.
  map<int32, AppToWebUserRepository> app_to_web_repo_by_user = 1;
}
