syntax = "proto3";

package com.android.systemui.motioncues;

option java_multiple_files = true;

message MotionBubble {
  float x = 1;
  float y = 2;
}

message MotionCueState {
  bool is_started = 1;
  string paint_color = 2;
  int32 bubble_shape_res_id = 3;
  int32 horizontal_spacing_dp = 4;
  int32 vertical_spacing_dp = 5;
  int32 margin_size = 6;
  int32 radius = 7;
  repeated MotionBubble motion_bubbles = 8;
  string client_package_name = 9;
}
