syntax = "proto3";

package android.companion;

option java_multiple_files = true;

// Next index: 2
message TaskContinuityMessage {
  oneof data {
    TaskStackBroadcastMessage task_stack_broadcast = 1;
    HandoffRequestMessage handoff_request = 2;
    HandoffRequestResultMessage handoff_request_result = 3;
  }
}

message TaskStackBroadcastMessage {
  bool is_stack_empty = 1;
  repeated RemoteTaskInfo remoteTasks = 2;
}

message HandoffRequestMessage {
  int32 task_id = 1;
}

message RemoteTaskInfo {
  int32 id = 1;
  string package_name = 2;
  bool is_in_foreground = 3;
  int64 lastUsedTimeMillis = 4;
  HandoffOptions handoffOptions = 5;
}

message HandoffOptions {
  bool isHandoffEnabled = 1;
  bool requirePackageInstalled = 2;
}

message HandoffRequestResultMessage {
  int32 statusCode = 1;
  int32 taskId = 2;
  repeated HandoffActivityDataMessage activities = 3;
}

message HandoffActivityDataMessage {
  string componentName = 1;
  string fallbackUri = 2;
  bytes extras = 3;
  repeated bytes signature_digests = 4;
}
