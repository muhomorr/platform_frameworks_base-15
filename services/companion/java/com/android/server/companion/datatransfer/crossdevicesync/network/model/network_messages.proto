syntax = "proto2";

package com.android.server.companion.datatransfer.crossdevicesync.network.model;

option java_multiple_files = true;

/**
 * A message to send or receive from CompanionDeviceManager.
 * (Corresponds to com.android.server.companion.datatransfer.crossdevicesync.network.model.Message)
 */
message MessageProto {
    optional int64 handle_id = 1;
    optional string network_id = 2;
    optional bytes payload = 3;
}

/**
 * A batched message format that groups multiple messages and multiple ACKs together.
 * (Corresponds to com.android.server.companion.datatransfer.crossdevicesync.network.model.BatchedMessage)
 */
message BatchedMessageProto {
    repeated MessageProto messages = 1;
    repeated int64 ack_ids = 2;
    optional int64 sender_instance_id = 3;
}
