syntax = "proto2";

package com.android.server.companion.datatransfer.crossdevicesync.data.model;

option java_multiple_files = true;

/**
 * A network message used for syncing data between devices.
 * (Corresponds to com.android.server.companion.datatransfer.crossdevicesync.data.model.NetworkMessage)
 */
message NetworkMessageProto {
    optional string doc_id = 1;
    optional string sender_node_id = 2;
    optional string receiver_node_id = 3;
    optional bytes doc_version = 4;
    optional bytes doc_update = 5;
}

/**
 * Metadata of a document and its records.
 * (Corresponds to com.android.server.companion.datatransfer.crossdevicesync.data.model.DocumentMetadata)
 */
message DocumentMetadataProto {
    optional int32 schema_version = 1;
    repeated RecordMetadataProto record_metadata_list = 2;
    // The version vector of a document, extracted from submerge and used for accessing doc version
    // without loading submerge.
    optional bytes doc_version = 3;

    message RecordMetadataProto {
        optional string path = 1;
        optional bool last_modified_by_local_device = 2;
    }
}
